[pytest]
# Папка с тестами
testpaths = tests

# Показывать короткий traceback при ошибках
addopts = -v --tb=short

# Описания пользовательских маркеров (чтобы не было предупреждений)
markers =
    smoke: Smoke tests - critical functionality, run first
    regression: Regression tests - verify fixed bugs don't return
    unit: Pure unit tests - no database or external dependencies
    integration: Integration tests - test multiple layers together
